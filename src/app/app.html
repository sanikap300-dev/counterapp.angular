<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* Center the card */
:host{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#6a11cb);
}

/* Rectangle Card */
.container{
    width:500px;
    height:300px;
    background:#333;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Heading */
h1{
    color:#333;
    margin-bottom:15px;
    font-size:32px;
}

/* Counter Number */
.count{
    font-size:70px;
    font-weight:bold;
    color:#4a00e0;
    margin-bottom:20px;
}

/* Buttons */
.buttons{
    display:flex;
    gap:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:red;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

.inc{
    background:#333;
}

.dec{
    background:#333;
}

.reset{
    background: #333;;
}
        
</style>
</head>
<body>

    <h1>Counter App</h1>

<h2>
    {{count}}
</h2>

<div class="btn">
    <button (click)="inc()">INC</button>
    <button (click)="dec()">DEC</button>
    <button (click)="reset()">RESET</button>
</div>
    
</body>
</html>
